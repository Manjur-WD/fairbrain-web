<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FairBrain</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            purple: '#6B409E',
                            purpleLight: '#8A5FB8',
                            orange: '#F98616',
                            yellow: '#FFCA2C',
                            dark: '#333333',
                            gray: '#F3F4F6'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans text-brand-dark antialiased bg-white overflow-x-hidden min-h-screen flex flex-col">
    <!-- Header -->
    <header class="w-full bg-white shadow-sm z-50 text-agency sticky top-0">
        <div class="container mx-auto px-4 lg:px-8 py-3 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-2">
                <a href="index.html">
                    <img src="assets/images/logo/Fairbrain Logo PNG.png" width="300" height="150" alt="FairBrain Logo"
                        class="w-40 relative z-10">
                </a>
            </div>

            <!-- Navbar -->
            <nav class="hidden md:flex space-x-6 lg:space-x-8 font-medium text-sm lg:text-base">
                <a href="index.html" class="text-brand-dark hover:text-brand-orange transition-colors">Home</a>
                <a href="about.html" class="text-brand-dark hover:text-brand-orange transition-colors">About Us</a>
                <a href="gallery.html" class="text-brand-dark hover:text-brand-orange transition-colors">Web Design</a>
                <a href="service.html" class="text-brand-dark hover:text-brand-orange transition-colors">Services</a>
                <a href="portfolio.html" class="text-brand-dark hover:text-brand-orange transition-colors">Portfolio</a>
                <a href="contact.html" class="text-brand-dark hover:text-brand-orange transition-colors">Contact Us</a>
            </nav>

            <!-- Login / Mobile Menu -->
            <div class="flex items-center gap-4">
                <!-- Active Login Button -->
                <button onclick="window.location.href='login.html'"
                    class="bg-brand-dark hover:bg-black text-white px-5 py-2.5 rounded-md font-semibold text-sm transition-colors flex items-center gap-2 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                    </svg>
                    <span>Login</span>
                </button>
                <button class="md:hidden text-brand-dark p-2" id="mobile-menu-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu"
        class="fixed inset-y-0 right-0 z-[100] w-64 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 md:hidden flex flex-col items-center pt-8 border-l border-brand-orange/20">
        <button id="close-mobile-menu" class="absolute top-6 right-6 text-brand-dark hover:text-brand-orange">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
        <div class="flex flex-col gap-6 w-full text-center px-4 mt-8">
            <a href="index.html" class="text-brand-dark hover:text-brand-orange text-lg font-bold border-b pb-2">Home</a>
            <a href="about.html" class="text-brand-dark hover:text-brand-orange text-lg font-bold border-b pb-2">About Us</a>
            <a href="gallery.html" class="text-brand-dark hover:text-brand-orange text-lg font-bold border-b pb-2">Web Design</a>
            <a href="service.html" class="text-brand-dark hover:text-brand-orange text-lg font-bold border-b pb-2">Services</a>
            <a href="portfolio.html" class="text-brand-dark hover:text-brand-orange text-lg font-bold border-b pb-2">Portfolio</a>
            <a href="contact.html" class="text-brand-dark hover:text-brand-orange text-lg font-bold">Contact Us</a>
            <button onclick="window.location.href='login.html'"
                class="bg-gradient-to-r from-brand-orange to-brand-yellow text-white px-6 py-3 rounded-md font-semibold mt-4 shadow-md w-full">Login
                Account</button>
        </div>
    </div>

    <!-- Main Content Background Area -->
    <main class="flex-grow w-full relative bg-cover bg-center flex items-center min-h-[600px] lg:min-h-[calc(100vh-80px)]" style="background-image: url('assets/images/login/login-bg.jpg'); background-position: right center;">
        
        <!-- Since the background image might have empty space or birds, we float the card on the left side -->
        <div class="container mx-auto px-4 lg:px-24 relative z-10 w-full flex justify-start py-12">
            
            <!-- Login Card -->
            <!-- Using backdrop-blur and slight transparency to allow the bg elements to subtly show through if they overlap -->
            <div class="w-full max-w-[450px] bg-white/95 backdrop-blur-md rounded-3xl p-8 lg:p-10 shadow-[0_15px_60px_-15px_rgba(0,0,0,0.3)] border-2 border-brand-orange/40 relative">
                
                <!-- Logo & Title Heading -->
                <div class="text-center mb-8">
                    <!-- The mockup has a fancy script 'Welcome to' and bold 'FAIRBRAIN' -->
                    <h2 class="flex flex-col md:flex-row items-center justify-center gap-2 mb-2 leading-none">
                        <span class="text-vartigo text-brand-purple text-4xl lg:text-5xl font-normal drop-shadow-sm">Welcome to</span> 
                        <span class="text-brand-orange font-extrabold text-2xl lg:text-3xl tracking-wide uppercase mt-1 md:mt-0">FairBrain</span>
                    </h2>
                    
                    <div class="text-[11px] md:text-xs text-gray-500 font-medium space-y-0.5 mt-2">
                        <p>Where creativity meets strategy.</p>
                        <p>Login to access your projects, designs, and brand assets.</p>
                    </div>
                </div>

                <!-- Form -->
                <form class="space-y-5">
                    
                    <!-- Email -->
                    <div>
                        <label class="block text-xs font-extrabold text-brand-dark mb-1.5 ml-1">Email*</label>
                        <input type="email" placeholder="email@example.com" 
                            class="w-full bg-white border border-gray-300 text-gray-700 rounded py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-purple/20 focus:border-brand-purple transition-all placeholder-gray-400">
                    </div>
                    
                    <!-- Password -->
                    <div>
                        <label class="block text-xs font-extrabold text-brand-dark mb-1.5 ml-1">Password*</label>
                        <div class="relative">
                            <input type="password" placeholder="••••••••••••" 
                                class="w-full bg-white border border-gray-300 text-gray-700 rounded py-3 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-purple/20 focus:border-brand-purple transition-all placeholder-gray-400">
                            
                            <!-- Eye icon -->
                            <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                   <!-- Eye crossed out (hidden state by default) -->
                                   <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between pt-1">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <!-- Hidden native checkbox -->
                            <input type="checkbox" class="peer sr-only">
                            <!-- Custom checkbox visual -->
                            <div class="w-4 h-4 rounded border border-gray-400 flex items-center justify-center peer-checked:bg-brand-purple peer-checked:border-brand-purple transition-colors">
                                <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                                </svg>
                            </div>
                            <span class="text-[11px] font-bold text-brand-dark group-hover:text-brand-purple transition-colors">Remember me</span>
                        </label>
                        
                        <a href="#" class="text-[11px] font-bold text-brand-dark hover:text-brand-orange transition-colors">Forgot password?</a>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="pt-4">
                        <!-- Dark Purple button matching mockup -->
                        <button type="submit" 
                            class="w-full bg-[#4A3274] text-white rounded py-3.5 font-bold text-sm shadow-md hover:bg-brand-purple transition-colors">
                            Log In
                        </button>
                    </div>
                    
                    <!-- Sign Up Trigger -->
                    <div class="text-center pt-2 pb-2">
                        <p class="text-[11px] text-gray-500 font-medium">Don't have an account <a href="#" class="font-extrabold text-brand-dark hover:text-brand-orange ml-1 transition-colors">SignUp</a></p>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <!-- Custom Scripts -->
    
    <script src="assets/js/main.js"></script>
</body>

</html>
